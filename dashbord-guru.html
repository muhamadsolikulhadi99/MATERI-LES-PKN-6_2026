<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Guru</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>👩‍🏫 Dashboard Guru</h2>

<h3>🏆 Ranking Siswa</h3>
<table>
<tr><th>Peringkat</th><th>Nama</th><th>Nilai</th></tr>
<tbody id="rankingTable"></tbody>
</table>

<button onclick="resetData()">Reset Semua Data</button>

<script>
let data = JSON.parse(localStorage.getItem("ranking")) || [];
let html = "";

data.forEach((s,i)=>{
  html += `<tr>
             <td>${i+1}</td>
             <td>${s.nama}</td>
             <td>${s.nilai}</td>
           </tr>`;
});

document.getElementById("rankingTable").innerHTML = html;

function resetData(){
  if(confirm("Yakin reset semua data?")){
    localStorage.clear();
    location.reload();
  }
}
</script>

</body>
</html>
